
version: 2

models:
  - name: stg_nostr_events_all
    description: "Staging model for all Nostr events with extracted JSON fields and enriched kind metadata"
    columns:
      - name: content
        description: "Content of the Nostr event"
      - name: created_at
        description: "Timestamp when the event was created"
      - name: id
        description: "Unique identifier for the Nostr event"
      - name: kind
        description: "Type of Nostr event (cast as integer for easy joining)"
      - name: npub
        description: "Bech32 encoded public key"
      - name: relayUrl
        description: "URL of the relay where the event was published"
      - name: sig
        description: "Cryptographic signature of the event"
      - name: tags
        description: "Array of tags associated with the event"
      - name: kind_name
        description: "Human-readable name for the event kind (from external kind metadata table)"

  - name: int_profile_metadata
    description: "Intermediate model that parses kind 0 (profile metadata) events to extract username, description, and other profile fields. Keeps only the latest profile per npub."
    columns:
      - name: npub
        description: "Bech32 encoded public key"
      - name: pubkey_hex
        description: "Hex encoded public key (for joining with follower data)"
      - name: event_id
        description: "Event ID of the latest profile update"
      - name: created_at
        description: "Timestamp of the latest profile update"
      - name: username
        description: "Username from profile metadata (name field)"
      - name: description
        description: "Bio/description from profile metadata (about field)"
      - name: display_name
        description: "Display name from profile metadata"
      - name: picture
        description: "Profile picture URL"
      - name: nip05
        description: "NIP-05 identifier (email-like verification)"

  - name: int_follower_counts
    description: "Intermediate model that aggregates follower counts per npub from the follows fact table"
    columns:
      - name: npub_hex
        description: "Public key in hex format being followed"
      - name: follower_count
        description: "Number of unique accounts following this npub"

  - name: int_profile_frequency
    description: "Intermediate model that calculates how frequently usernames and descriptions appear across profiles, along with the maximum follower count for each"
    columns:
      - name: npub
        description: "Bech32 encoded public key"
      - name: username
        description: "Username from profile metadata"
      - name: description
        description: "Description from profile metadata"
      - name: follower_count
        description: "Number of followers for this npub"
      - name: username_frequency
        description: "Number of accounts using this exact username"
      - name: max_followers_with_username
        description: "Maximum follower count among all accounts with this username"
      - name: description_frequency
        description: "Number of accounts using this exact description"
      - name: max_followers_with_description
        description: "Maximum follower count among all accounts with this description"

  - name: stg_podcast_events
    description: "Staging model for Nostr events referencing podcasts via NIP-73 i-tags. Deduplicated across relays."
    columns:
      - name: event_id
        description: "Unique identifier of the Nostr event"
      - name: npub
        description: "Bech32 encoded public key of the event author"
      - name: author_pubkey
        description: "Hex encoded public key of the event author"
      - name: kind
        description: "Event kind (1=share, 9735=zap, 1111=comment)"
      - name: created_at
        description: "Timestamp when the event was created"
      - name: content
        description: "Text content of the event"
      - name: relay_url
        description: "URL of the relay where the event was ingested"
      - name: episode_guid
        description: "GUID of the podcast episode extracted from i-tag"
      - name: episode_url
        description: "URL pointing to the podcast episode"
      - name: show_guid
        description: "GUID of the podcast show/feed extracted from i-tag"
      - name: show_url
        description: "URL pointing to the podcast show/feed"
      - name: publisher_guid
        description: "GUID of the podcast publisher extracted from i-tag"
      - name: publisher_url
        description: "URL pointing to the podcast publisher"

  - name: stg_podcast_zaps
    description: "Staging model for Lightning zap receipts (kind 9735) targeting podcasts. Extracts amount, recipient, and podcast refs."
    columns:
      - name: event_id
        description: "Unique identifier of the zap receipt"
      - name: npub
        description: "Bech32 encoded public key of the zapper"
      - name: author_pubkey
        description: "Hex encoded public key of the zapper"
      - name: created_at
        description: "Timestamp when the zap receipt was created"
      - name: episode_guid
        description: "GUID of the episode that was zapped"
      - name: show_guid
        description: "GUID of the show that was zapped"
      - name: publisher_guid
        description: "GUID of the publisher that was zapped"
      - name: recipient_pubkey
        description: "Hex pubkey of the recipient (p tag)"
      - name: bolt11_invoice
        description: "Lightning invoice string (bolt11 tag)"
      - name: zap_request_json
        description: "Serialized zap request JSON (description tag)"
      - name: amount_msats
        description: "Zap amount in millisatoshis extracted from the zap request description"

  - name: int_podcast_episodes
    description: "Intermediate model that aggregates podcast episode references to show/publisher metadata."
    columns:
      - name: episode_guid
        description: "GUID of the podcast episode"
      - name: show_guid
        description: "Associated podcast show/feed GUID"
      - name: publisher_guid
        description: "Associated podcast publisher GUID"
      - name: episode_url
        description: "URL pointing to the episode"
      - name: show_url
        description: "URL pointing to the show/feed"
      - name: first_seen_at
        description: "First time this episode was observed in the dataset"
      - name: last_seen_at
        description: "Most recent time this episode was observed"
      - name: total_event_count
        description: "Total podcast-referencing events for this episode"
      - name: share_count
        description: "Number of share events (kind 1) referencing this episode"
      - name: zap_count
        description: "Number of zap receipts (kind 9735) referencing this episode"
      - name: comment_count
        description: "Number of comment events (kind 1111) referencing this episode"
      - name: unique_interactors
        description: "Unique npubs interacting with this episode"

  - name: stg_live_events
    description: "Staging model for NIP-53 Live Event metadata (kind 30311). Deduplicated across relays and service-neutral."
    columns:
      - name: event_id
        description: "Unique identifier of the Nostr event"
      - name: author_pubkey
        description: "Bech32 encoded public key of the event author"
      - name: created_at
        description: "Timestamp when the event was created"
      - name: content
        description: "Text content of the event (often empty for 30311)"
      - name: relay_url
        description: "URL of the relay where the event was ingested"
      - name: stream_id
        description: "Live stream identifier from the d-tag"
      - name: status
        description: "Stream status from the status tag (live or ended)"
      - name: title
        description: "Stream title"
      - name: summary
        description: "Stream description / summary"
      - name: image_url
        description: "Cover image URL"
      - name: thumb_url
        description: "Thumbnail image URL"
      - name: alt_url
        description: "Alternate URL (e.g., zap.stream watch page)"
      - name: service_url
        description: "Service API endpoint that published the event"
      - name: streaming_url
        description: "Direct media stream URL (e.g., HLS)"
      - name: starts_unix
        description: "Stream start time as a Unix timestamp string"
      - name: ends_unix
        description: "Stream end time as a Unix timestamp string"
      - name: goal_pubkey
        description: "Lightning goal / campaign pubkey"
      - name: host_pubkey
        description: "Host pubkey extracted from p-tag with role=host"
      - name: hashtags
        description: "Array of hashtag strings from t-tags"

  - name: stg_live_zaps
    description: "Staging model for zap receipts (kind 9735) targeting live streams. Joins to stg_live_events for stream context."
    columns:
      - name: event_id
        description: "Unique identifier of the zap receipt"
      - name: zapper_pubkey
        description: "Bech32 encoded public key of the zapper"
      - name: created_at
        description: "Timestamp when the zap receipt was created"
      - name: relay_url
        description: "URL of the relay where the event was ingested"
      - name: zapped_event_id
        description: "Event ID of the live stream event that was zapped"
      - name: recipient_pubkey
        description: "Hex pubkey of the recipient (p tag)"
      - name: bolt11_invoice
        description: "Lightning invoice string"
      - name: amount_msats
        description: "Zap amount in millisatoshis extracted from the zap request description"
      - name: stream_id
        description: "Live stream identifier from the associated 30311 event"
      - name: stream_title
        description: "Title of the stream at the time of the zap"
      - name: stream_host
        description: "Host pubkey of the stream"
      - name: stream_service_url
        description: "Service URL of the stream"
      - name: stream_status_at_zap
        description: "Stream status at the time the zap receipt was created"

  - name: int_live_streams
    description: "Intermediate model: one row per live stream. Latest metadata and rollup counts across all 30311 events."
    columns:
      - name: stream_id
        description: "Live stream identifier from the d-tag"
      - name: title
        description: "Latest stream title"
      - name: summary
        description: "Latest stream summary"
      - name: image_url
        description: "Latest cover image URL"
      - name: thumb_url
        description: "Latest thumbnail URL"
      - name: alt_url
        description: "Latest alternate watch URL"
      - name: service_url
        description: "Service API endpoint that published the event"
      - name: streaming_url
        description: "Direct media stream URL"
      - name: host_pubkey
        description: "Host pubkey extracted from the latest event's p-tag"
      - name: goal_pubkey
        description: "Lightning goal / campaign pubkey"
      - name: hashtags
        description: "Hashtags from the latest event"
      - name: first_seen_at
        description: "First time this stream was observed"
      - name: last_seen_at
        description: "Most recent update for this stream"
      - name: event_count
        description: "Total number of 30311 events for this stream"
      - name: live_event_count
        description: "Number of events with status=live"
      - name: ended_event_count
        description: "Number of events with status=ended"
      - name: statuses_seen
        description: "Array of unique statuses observed for this stream"

  - name: stg_poll_events
    description: "Staging model for NIP-88 Poll creation events (kind 1068). Extracts question, options, type, end date, and client. Deduplicated across relays."
    columns:
      - name: poll_event_id
        description: "Unique identifier of the poll event"
      - name: npub
        description: "Bech32 encoded public key of the poll author"
      - name: author_pubkey
        description: "Hex encoded public key of the poll author"
      - name: created_at
        description: "Timestamp when the poll was created"
      - name: poll_question
        description: "Poll question text from the content field"
      - name: poll_type
        description: "Poll type from the polltype tag (singlechoice, multiplechoice)"
      - name: ends_at
        description: "Timestamp when the poll ends, parsed from the endsAt tag"
      - name: client
        description: "Client that published the poll"
      - name: poll_options
        description: "Array of structs with option_index and option_text"
      - name: option_count
        description: "Number of options in the poll"
      - name: is_open
        description: "Boolean indicating if the poll is still open"

  - name: stg_poll_votes
    description: "Staging model for NIP-88 Poll Response / Vote events (kind 1018). Links votes to parent poll via e-tag. Deduplicated across relays."
    columns:
      - name: vote_event_id
        description: "Unique identifier of the vote event"
      - name: npub
        description: "Bech32 encoded public key of the voter"
      - name: author_pubkey
        description: "Hex encoded public key of the voter"
      - name: created_at
        description: "Timestamp when the vote was cast"
      - name: selected_option
        description: "The option value selected by the voter"
      - name: poll_event_id
        description: "Event ID of the poll being voted on (from e-tag)"
      - name: label
        description: "Optional label from l-tag"
      - name: relay_url
        description: "URL of the relay where the vote was ingested"
