
version: 2

models:
  - name: fct_follows
    description: "Fact table containing follower relationships extracted from kind 3 (contact list) events"

  - name: fct_impersonator_flags
    description: |
      Fact table that identifies potential impersonator accounts based on username/description frequency
      and follower count heuristics. Accounts are flagged when they share common usernames or descriptions
      with many other accounts but have disproportionately low follower counts.
      
      Configurable thresholds (set via dbt_project.yml vars):
      - username_frequency_threshold: Minimum number of accounts with same username to consider (default: 5)
      - description_frequency_threshold: Minimum number of accounts with same description to consider (default: 3)
      - follower_ratio_threshold: Maximum follower ratio compared to max followers for that name/description (default: 0.10 = 10%)
      
      Example configurations for different sensitivity levels:
      
      Conservative (fewer false positives):
        vars:
          username_frequency_threshold: 10
          description_frequency_threshold: 5
          follower_ratio_threshold: 0.05
      
      Moderate (default):
        vars:
          username_frequency_threshold: 5
          description_frequency_threshold: 3
          follower_ratio_threshold: 0.10
      
      Aggressive (more false positives, catches more potential impersonators):
        vars:
          username_frequency_threshold: 3
          description_frequency_threshold: 2
          follower_ratio_threshold: 0.20

    columns:
      - name: npub
        description: "Bech32 encoded public key"
      - name: username
        description: "Username from profile metadata"
      - name: description
        description: "Description/bio from profile metadata"
      - name: follower_count
        description: "Number of followers this account has"
      - name: username_frequency
        description: "Number of accounts using this exact username"
      - name: description_frequency
        description: "Number of accounts using this exact description"
      - name: max_followers_with_username
        description: "Maximum follower count among all accounts with this username"
      - name: max_followers_with_description
        description: "Maximum follower count among all accounts with this description"
      - name: username_follower_ratio
        description: "Ratio of this account's followers to max followers for this username (0-1)"
      - name: description_follower_ratio
        description: "Ratio of this account's followers to max followers for this description (0-1)"
      - name: is_username_impersonator
        description: "Flag indicating if account is flagged as impersonator based on username heuristics"
      - name: is_description_impersonator
        description: "Flag indicating if account is flagged as impersonator based on description heuristics"
      - name: is_potential_impersonator
        description: "Overall flag indicating if account is flagged by either username or description heuristics"
      - name: risk_score
        description: "Calculated risk score (0-1+) based on frequency and follower ratios. Higher = more likely to be impersonator"

  - name: fct_user_activity_metrics
    description: |
      Daily activity metrics aggregated per user. Combines multiple event types 
      (notes, reactions, reposts, zaps, profiles, contact lists) into a single 
      view for analyzing user engagement and activity patterns over time.
      
      Useful for:
      - Identifying power users and active contributors
      - Tracking user engagement trends over time
      - User segmentation and cohort analysis
      - Calculating user-level KPIs (DAU/WAU/MAU)
    
    columns:
      - name: npub
        description: "Bech32 encoded public key identifying the user"
        tests:
          - not_null
      - name: activity_date
        description: "Date when the activity occurred"
        tests:
          - not_null
      - name: notes_published
        description: "Number of text notes (kind 1) published by the user on this date"
      - name: reactions_sent
        description: "Number of reactions (kind 7) sent by the user on this date"
      - name: reposts_made
        description: "Number of reposts (kind 6) made by the user on this date"
      - name: zaps_sent_count
        description: "Number of zaps (kind 9735) sent by the user on this date"
      - name: profile_updates
        description: "Number of profile metadata updates (kind 0) made by the user on this date"
      - name: contact_list_updates
        description: "Number of contact list updates (kind 3) made by the user on this date"
      - name: activity_score
        description: |
          Weighted activity score: notes=2pts, reactions=1pt, reposts=3pts, 
          zaps=5pts, profile/contact updates=1pt each. Higher = more active.

  - name: fct_content_engagement
    description: |
      Per-note engagement metrics aggregating reactions, reposts, zaps, and replies.
      Provides a comprehensive view of how content performs on the network.
      
      Useful for:
      - Identifying trending and viral content
      - Analyzing content performance patterns
      - Finding top-performing authors
      - Content recommendation and discovery
    
    columns:
      - name: note_id
        description: "Unique event ID of the note"
        tests:
          - not_null
      - name: author_npub
        description: "Bech32 encoded public key of the note author"
      - name: author_pubkey
        description: "Hex encoded public key of the note author"
      - name: published_at
        description: "Timestamp when the note was published"
        tests:
          - not_null
      - name: published_date
        description: "Date when the note was published"
      - name: content_preview
        description: "First 280 characters of the note content"
      - name: reaction_count
        description: "Total number of reactions (kind 7) on this note"
      - name: unique_reactors
        description: "Number of unique users who reacted to this note"
      - name: repost_count
        description: "Total number of reposts (kind 6) of this note"
      - name: unique_reposters
        description: "Number of unique users who reposted this note"
      - name: zap_count
        description: "Total number of zaps (kind 9735) received by this note"
      - name: unique_zappers
        description: "Number of unique users who zapped this note"
      - name: total_zap_msats
        description: "Total zap amount in millisatoshis received by this note"
      - name: total_zap_sats
        description: "Total zap amount in satoshis received by this note"
      - name: reply_count
        description: "Number of replies (kind 1 with 'e' tag pointing to this note)"
      - name: unique_repliers
        description: "Number of unique users who replied to this note"
      - name: engagement_score
        description: |
          Weighted composite score: reactions=1pt, reposts=3pts, replies=2pts,
          zaps=1pt + 0.1pt per 100 sats. Higher = more engaging content.

  - name: fct_podcast_engagement
    description: |
      Daily engagement metrics for podcast episodes and shows.
      Aggregates shares, zaps, and total satoshis sent to podcast content.
    columns:
      - name: content_guid
        description: "Either episode_guid or show_guid"
      - name: content_type
        description: "episode or show"
      - name: event_date
        description: "Date of the aggregated activity"
      - name: share_count
        description: "Number of share events (kind 1)"
      - name: zap_count
        description: "Number of zap receipts (kind 9735)"
      - name: total_zap_sats
        description: "Total zap amount in satoshis"
      - name: unique_interactors
        description: "Unique npubs interacting with this content on this date"
      - name: total_events
        description: "Total distinct events (shares + zaps)"

  - name: fct_podcast_show_engagement
    description: |
      Daily engagement metrics at the show (podcast) level.
      Aggregates shares, comments, zaps, and total satoshis sent to each show per day.
    columns:
      - name: show_guid
        description: "Podcast show GUID extracted from podcast:guid i-tag"
      - name: event_date
        description: "Date of the aggregated activity"
      - name: active_episode_count
        description: "Number of distinct episodes with activity on this date"
      - name: share_count
        description: "Number of share events (kind 1)"
      - name: comment_count
        description: "Number of comment events (kind 1111)"
      - name: zap_event_count
        description: "Number of zap actions from podcast events CTE"
      - name: unique_interactors
        description: "Unique npubs interacting with this show on this date"
      - name: zap_receipt_count
        description: "Number of zap receipts (kind 9735)"
      - name: total_zap_sats
        description: "Total zap amount in satoshis"
      - name: unique_zappers
        description: "Unique npubs sending zaps to this show"
      - name: total_events
        description: "Total distinct events (shares + comments + zap receipts)"

  - name: fct_podcast_publisher_engagement
    description: |
      Daily engagement metrics at the content creator (publisher) level.
      Aggregates shares, comments, zaps, and satoshis sent to each publisher per day.
    columns:
      - name: publisher_guid
        description: "Content creator GUID extracted from podcast:publisher:guid i-tag"
      - name: event_date
        description: "Date of the aggregated activity"
      - name: active_episode_count
        description: "Number of distinct episodes with activity on this date"
      - name: active_show_count
        description: "Number of distinct shows with activity on this date"
      - name: share_count
        description: "Number of share events (kind 1)"
      - name: comment_count
        description: "Number of comment events (kind 1111)"
      - name: zap_event_count
        description: "Number of zap actions from podcast events CTE"
      - name: unique_interactors
        description: "Unique npubs interacting with this publisher on this date"
      - name: zap_receipt_count
        description: "Number of zap receipts (kind 9735)"
      - name: total_zap_sats
        description: "Total zap amount in satoshis"
      - name: unique_zappers
        description: "Unique npubs sending zaps to this publisher"
      - name: total_events
        description: "Total distinct events (shares + comments + zap receipts)"

  - name: diag_podcast_data_quality
    description: |
      Diagnostic metrics for profiling podcast staging models.
      Tracks null GUID rates, inferred app distributions, multi-show episodes,
      zap amount health, and other data quality signals.
      Designed for manual triage — does not assert correctness.
    columns:
      - name: checkpoint
        description: "Category of diagnostic (e.g., null_guid_rate, inferred_app_distribution)"
      - name: dimension
        description: "Specific field or value within the checkpoint"
      - name: pct
        description: "Percentage of rows matching the diagnostic condition"
      - name: numerator
        description: "Count matching the condition"
      - name: denominator
        description: "Total count for the denominator"
      - name: unit
        description: "Unit of measurement (percent, count, etc.)"
      - name: sample_values
        description: "Optional sample values for quick reference"

  - name: fct_live_engagement
    description: "Daily engagement metrics per live stream. Aggregates kind 30311 events and kind 9735 zaps."
    columns:
      - name: activity_date
        description: "Calendar date of the aggregated activity"
      - name: stream_id
        description: "Live stream identifier"
      - name: title
        description: "Stream title (from int_live_streams)"
      - name: host_pubkey
        description: "Host pubkey of the stream"
      - name: service_url
        description: "Service URL of the stream"
      - name: event_count
        description: "Total 30311 events for this stream on this date"
      - name: live_count
        description: "Events with status=live"
      - name: ended_count
        description: "Events with status=ended"
      - name: unique_authors
        description: "Unique pubkeys publishing 30311 events"
      - name: zap_count
        description: "Number of zap receipts targeting this stream"
      - name: unique_zappers
        description: "Unique zapper pubkeys"
      - name: total_zap_sats
        description: "Total zap amount in satoshis"

  - name: fct_polls
    description: "Poll metrics mart. Combines NIP-88 poll creation events (kind 1068) with aggregated vote counts from kind 1018. One row per poll."
    columns:
      - name: poll_event_id
        description: "Unique identifier of the poll event"
      - name: author_npub
        description: "Bech32 encoded public key of the poll author"
      - name: author_pubkey
        description: "Hex encoded public key of the poll author"
      - name: poll_created_at
        description: "Timestamp when the poll was created"
      - name: poll_question
        description: "Poll question text"
      - name: poll_type
        description: "Poll type (singlechoice, multiplechoice)"
      - name: ends_at
        description: "Timestamp when the poll ends"
      - name: client
        description: "Client that published the poll"
      - name: option_count
        description: "Number of available options"
      - name: is_open
        description: "Boolean indicating if the poll is still open"
      - name: total_votes
        description: "Total number of votes cast on this poll"
      - name: total_unique_voters
        description: "Number of unique voters"
      - name: latest_vote_date
        description: "Date of the most recent vote"
